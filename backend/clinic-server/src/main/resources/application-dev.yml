clinic:
  server:
    port: 8080
    context-path: /api/v1
  application:
    name: clinic-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: clinic_management
    username: root
    password: 1234
    server-timezone: Asia/Shanghai
  redis:
    host: localhost
    port: 6379
    database: 5
    password: 123456
    timeout: 3s
    cache-ttl-minutes: 30
    verification-code-ttl-minutes: 5
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
      - http://localhost:7777
      - http://127.0.0.1:7777
  auth:
    jwt-secret: ${CLINIC_JWT_SECRET:clinic-management-system-jwt-secret-change-in-production-2026}
    issuer: clinic-server
    token-expire-hours: 12
